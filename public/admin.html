<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>גאליס — ניהול</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Login screen -->
<div id="login-screen" class="login-wrap">
  <div class="login-box">
    <svg style="width:58px;height:auto;color:#1c1c1c;margin-bottom:0.6rem" viewBox="0 0 100 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M 50,72 C 22,56 4,38 4,22 C 4,8 14,2 26,4 C 36,6 46,16 50,26 C 54,16 64,6 74,4 C 86,2 96,8 96,22 C 96,38 78,56 50,72 Z"
            fill="currentColor"/>
    </svg>
    <h1>גאליס</h1>
    <p>הכנסי סיסמה כדי להמשיך</p>
    <div class="form-group">
      <input type="password" id="password-input" placeholder="סיסמה" />
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="login()">כניסה</button>
    <p id="login-error" class="error-msg"></p>
  </div>
</div>

<!-- Admin panel -->
<div id="admin-panel" style="display:none">
  <div class="admin-body">
    <div class="admin-header">
      <h1>ניהול גלריה</h1>
      <div style="display:flex;gap:0.5rem">
        <a href="/" class="btn btn-secondary">לאתר</a>
        <button class="btn btn-secondary" onclick="logout()">יציאה</button>
      </div>
    </div>

    <!-- Hero images -->
    <div class="card">
      <h2>תמונות ראשיות</h2>
      <p style="font-size:0.82rem;color:var(--mid);margin-bottom:1rem">שלוש התמונות שמופיעות בדף הבית</p>
      <div class="hero-slots" id="hero-slots"></div>
    </div>

    <!-- Upload new item -->
    <div class="card">
      <h2>הוספת פריט חדש</h2>
      <div id="upload-msg"></div>

      <div class="form-group">
        <label>תמונה</label>
        <div class="upload-area" id="upload-area">
          <input type="file" id="file-input" accept="image/*" onchange="previewImage(event)" />
          <p>לחצי כאן לבחירת תמונה</p>
          <small>JPG, PNG, WEBP עד 10MB</small>
        </div>
        <div class="image-preview" id="image-preview">
          <div id="preview-img" class="preview-bg-img"></div>
        </div>
        <div class="upload-zoom-controls" id="upload-zoom-controls" style="display:none">
          <div class="zoom-wrap">
            <span class="zoom-label">זום תמונה</span>
            <input type="range" min="50" max="250" value="100" id="upload-zoom-input" class="zoom-slider" oninput="updateUploadZoom(this)" />
            <span class="zoom-val" id="upload-zoom-val">100%</span>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>שם הפריט *</label>
        <input type="text" id="item-name" placeholder="לדוגמה: עגיל זהב עם אבן ירוקה" />
      </div>

      <div class="form-group">
        <label>תיאור (אופציונלי)</label>
        <textarea id="item-desc" placeholder="תיאור קצר של הפריט..."></textarea>
      </div>

      <div class="form-group">
        <label>קטגוריה *</label>
        <select id="item-category"></select>
      </div>

      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" id="item-bestseller" />
          <span>Best Seller (יופיע בדף הבית)</span>
        </label>
      </div>

      <button class="btn btn-primary" onclick="uploadItem()">העלאת פריט</button>
    </div>

    <!-- Categories -->
    <div class="card">
      <h2>קטגוריות</h2>
      <div id="cats-list" class="cats-list"></div>
      <div style="display:flex;gap:0.5rem;margin-top:1rem">
        <input type="text" id="new-cat-input" placeholder="שם קטגוריה חדשה" style="flex:1" />
        <button class="btn btn-primary" onclick="addCategory()">הוספה</button>
      </div>
      <p id="cat-msg" style="margin-top:0.5rem;font-size:0.85rem"></p>
    </div>

    <!-- Items list -->
    <div class="card">
      <h2>כל הפריטים</h2>
      <div id="items-list" class="items-list"></div>
      <p id="items-empty" style="color:var(--text-light);font-size:0.9rem;display:none">אין פריטים עדיין</p>
    </div>
  </div>
</div>

<!-- Edit modal -->
<div id="edit-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeEditModal()">
  <div class="modal-box">
    <div class="modal-header">
      <h2>עריכת פריט</h2>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div class="form-group">
      <label>תמונה חדשה (אופציונלי)</label>
      <div class="upload-area" onclick="document.getElementById('edit-file-input').click()">
        <p>לחצי לבחירת תמונה חדשה</p>
        <small>JPG, PNG, WEBP עד 10MB</small>
      </div>
      <input type="file" id="edit-file-input" accept="image/*" onchange="editPreviewImage(event)" style="display:none" />
      <div class="image-preview" id="edit-preview">
        <div id="edit-preview-img" class="preview-bg-img"></div>
      </div>
      <div class="zoom-wrap" style="margin-top:0.7rem">
        <span class="zoom-label">זום תמונה</span>
        <input type="range" min="50" max="250" value="100" id="edit-zoom-input" class="zoom-slider" oninput="updateEditZoom(this)" />
        <span class="zoom-val" id="edit-zoom-val">100%</span>
      </div>
    </div>
    <div class="form-group">
      <label>שם הפריט *</label>
      <input type="text" id="edit-name" />
    </div>
    <div class="form-group">
      <label>תיאור</label>
      <textarea id="edit-desc"></textarea>
    </div>
    <div class="form-group">
      <label>קטגוריה *</label>
      <select id="edit-category"></select>
    </div>
    <div style="display:flex;gap:0.5rem;justify-content:flex-end;margin-top:1rem">
      <button class="btn btn-secondary" onclick="closeEditModal()">ביטול</button>
      <button class="btn btn-primary" onclick="saveEdit()">שמירה</button>
    </div>
  </div>
</div>

<script src="admin.js"></script>
</body>
</html>
