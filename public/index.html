<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>גאליס</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script>if(new URLSearchParams(location.search).get('cat'))document.documentElement.classList.add('cat-view');</script>
</head>
<body>

  <header>
    <a href="/" class="logo-link">
      <img src="/logo.png" class="logo-svg" alt="גאליס" />
      <h1>גאליס</h1>
    </a>
    <p class="subtitle">עבודת יד שנוגעת ללב</p>

    <nav id="categories-nav">
      <button class="cat-btn active" data-category="">הכל</button>
    </nav>
  </header>

  <!-- Hero — direction:ltr: first=LEFT, second=RIGHT -->
  <section class="hero">
    <div class="hero-side">
      <div class="hero-img" id="hero-0"></div>
      <div class="hero-img" id="hero-1"></div>
    </div>
    <div class="hero-img hero-img--large" id="hero-2"></div>
  </section>

  <!-- Product gallery — images only -->
  <main>
    <div class="section-title" id="gallery-title">Best Seller</div>
    <div id="gallery" class="gallery-grid"></div>
    <p id="empty-msg" class="empty-msg" style="display:none">אין פריטים בקטגוריה זו עדיין</p>
  </main>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox" style="display:none">
    <div class="lightbox-overlay" onclick="closeLightbox()"></div>
    <div class="lightbox-content">
      <button class="lightbox-close" onclick="closeLightbox()">✕</button>
      <img id="lightbox-img" src="" alt="" />
      <div id="lightbox-thumbs" class="lightbox-thumbs" style="display:none">
        <div class="lb-thumb" id="lb-thumb-1" onclick="setLightboxImg(1)"></div>
        <div class="lb-thumb" id="lb-thumb-2" onclick="setLightboxImg(2)"></div>
      </div>
      <div class="lightbox-info">
        <h2 id="lightbox-name"></h2>
        <p id="lightbox-desc"></p>
        <span id="lightbox-cat"></span>
      </div>
    </div>
  </div>

  <footer>
    <a href="/admin.html" class="admin-link">ניהול</a>
  </footer>

  <script src="gallery.js"></script>
</body>
</html>
